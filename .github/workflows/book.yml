name: Friskis Auto-Book

on:
  schedule:
    - cron: '50 6 * * *'         # 07:50 CET (06:50 UTC)
    - cron: '*/30 15-19 * * *'   # Var 30:e min, 16-20 CET (15-19 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dump available activities
        env:
          FRISKIS_USERNAME_PETER: ${{ secrets.FRISKIS_USERNAME_PETER }}
          FRISKIS_PASSWORD_PETER: ${{ secrets.FRISKIS_PASSWORD_PETER }}
          FRISKIS_USERNAME: ${{ secrets.FRISKIS_USERNAME }}
          FRISKIS_PASSWORD: ${{ secrets.FRISKIS_PASSWORD }}
        run: python -m friskis_booker dump-activities --no-push

      - name: Dump bookings for Peter
        env:
          FRISKIS_USERNAME_PETER: ${{ secrets.FRISKIS_USERNAME_PETER }}
          FRISKIS_PASSWORD_PETER: ${{ secrets.FRISKIS_PASSWORD_PETER }}
          FRISKIS_USERNAME: ${{ secrets.FRISKIS_USERNAME }}
          FRISKIS_PASSWORD: ${{ secrets.FRISKIS_PASSWORD }}
        run: python -m friskis_booker dump-bookings --user peter --no-push

      - name: Dump bookings for Alexandra
        env:
          FRISKIS_USERNAME_ALEXANDRA: ${{ secrets.FRISKIS_USERNAME_ALEXANDRA }}
          FRISKIS_PASSWORD_ALEXANDRA: ${{ secrets.FRISKIS_PASSWORD_ALEXANDRA }}
        run: python -m friskis_booker dump-bookings --user alexandra --no-push
        continue-on-error: true

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/activities.json config/bookings-*.json
          git diff --cached --quiet || (git commit -m "Uppdatera pass och bokningar" && git push)

  book:
    runs-on: ubuntu-latest
    needs: update-data
    strategy:
      fail-fast: false
      matrix:
        user: [peter, alexandra]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check credentials
        id: creds
        env:
          FRISKIS_USERNAME_PETER: ${{ secrets.FRISKIS_USERNAME_PETER }}
          FRISKIS_PASSWORD_PETER: ${{ secrets.FRISKIS_PASSWORD_PETER }}
          FRISKIS_USERNAME_ALEXANDRA: ${{ secrets.FRISKIS_USERNAME_ALEXANDRA }}
          FRISKIS_PASSWORD_ALEXANDRA: ${{ secrets.FRISKIS_PASSWORD_ALEXANDRA }}
          FRISKIS_USERNAME: ${{ secrets.FRISKIS_USERNAME }}
          FRISKIS_PASSWORD: ${{ secrets.FRISKIS_PASSWORD }}
          USER: ${{ matrix.user }}
        run: |
          SUFFIX=$(echo "$USER" | tr '[:lower:]' '[:upper:]')
          U_VAR="FRISKIS_USERNAME_${SUFFIX}"
          P_VAR="FRISKIS_PASSWORD_${SUFFIX}"
          U_VAL="${!U_VAR}"
          P_VAL="${!P_VAR}"
          # Fallback for peter
          if [ "$USER" = "peter" ] && [ -z "$U_VAL" ]; then U_VAL="$FRISKIS_USERNAME"; fi
          if [ "$USER" = "peter" ] && [ -z "$P_VAL" ]; then P_VAL="$FRISKIS_PASSWORD"; fi
          if [ -z "$U_VAL" ] || [ -z "$P_VAL" ]; then
            echo "⚠️ Credentials saknas för $USER — hoppar över bokning"
            echo "  Lägg till FRISKIS_USERNAME_${SUFFIX} och FRISKIS_PASSWORD_${SUFFIX} som GitHub secrets"
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Credentials finns för $USER"
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run booker
        if: steps.creds.outputs.has_creds == 'true'
        env:
          FRISKIS_USERNAME_PETER: ${{ secrets.FRISKIS_USERNAME_PETER }}
          FRISKIS_PASSWORD_PETER: ${{ secrets.FRISKIS_PASSWORD_PETER }}
          FRISKIS_USERNAME_ALEXANDRA: ${{ secrets.FRISKIS_USERNAME_ALEXANDRA }}
          FRISKIS_PASSWORD_ALEXANDRA: ${{ secrets.FRISKIS_PASSWORD_ALEXANDRA }}
          FRISKIS_USERNAME: ${{ secrets.FRISKIS_USERNAME }}
          FRISKIS_PASSWORD: ${{ secrets.FRISKIS_PASSWORD }}
        run: python -m friskis_booker book --user ${{ matrix.user }}
